pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: pnpm exec -- biome check --write {staged_files} --no-errors-on-unmatched
      stage_fixed: true
    typecheck:
      glob: "apps/web/**/*.{ts,tsx}"
      run: pnpm --filter web typecheck

pre-push:
  commands:
    test:
      run: pnpm --filter web test --run || true
